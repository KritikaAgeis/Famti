name: Deploy Odoo

on:
  push:
    branches:
      - dev
      - uat

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ github.ref == 'refs/heads/dev' && secrets.DEV_EC2_HOST || secrets.UAT_EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ github.ref == 'refs/heads/dev' && secrets.SSH_PRIVATE_KEY || secrets.UAT_SSH_PRIVATE_KEY }}
          script: |
            set -e

            if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
              BRANCH=dev
              SERVICE=odoo18
              PORT=8018
            else
              BRANCH=uat
              SERVICE=odoo18-uat
              PORT=8018
            fi

            echo "-----------------------------------"
            echo "Deploying branch: $BRANCH"
            echo "Service: $SERVICE"
            echo "-----------------------------------"

            cd /opt/odoo18/custom

            echo "Stopping service..."
            sudo systemctl stop $SERVICE || true

            echo "Freeing port $PORT (if stuck)..."
            sudo fuser -k ${PORT}/tcp || true

            echo "Pulling latest code..."
            git fetch origin $BRANCH
            git reset --hard origin/$BRANCH
            git clean -fd
            git pull origin $BRANCH

            echo "Starting service..."
            sudo systemctl start $SERVICE

            echo "Checking service status..."
            sudo systemctl status $SERVICE --no-pager

            echo "Deployment successful ✅"
